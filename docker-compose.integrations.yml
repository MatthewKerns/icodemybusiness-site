version: '3.8'

services:
  integration-api:
    build:
      context: .
      dockerfile: Dockerfile.integrations
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - API_HOST=0.0.0.0
      - API_PORT=8000
    env_file:
      - .env
    volumes:
      - ./integrations:/app/integrations
    restart: unless-stopped
    networks:
      - integrations-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - integrations-network

networks:
  integrations-network:
    driver: bridge

volumes:
  redis-data: